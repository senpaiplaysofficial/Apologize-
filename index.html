<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .heart {
            position: absolute;
            color: #ff85a2;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            z-index: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Changed to allow scrolling from the top */
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 71, 126, 0.2);
            max-width: 420px;
            width: 85%;
            z-index: 10;
            border: 1px solid #ffccd5;
            animation: slideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 80vh; /* Keeps the box from growing taller than the screen */
            overflow-y: auto; /* Adds a scrollbar when the text is too long */
        }

        .active { display: flex; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ✨ Apply cursive ONLY to text content */
        h1, p {
            font-family: 'Great Vibes', cursive;
        }

        h1 { color: #c9184a; margin-bottom: 15px; font-size: 2rem; }
        p { color: #594157; line-height: 1.6; font-size: 1.3rem; }

        button {
            background: linear-gradient(45deg, #ff4d6d, #ff85a2);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.5);
        }

        .btn-group {
            display: flex; gap: 20px; margin-top: 30px; position: relative; height: 50px; width: 100%; justify-content: center;
        }

        #btnNo { background: #adb5bd; position: absolute; transition: 0.2s; }

        .options-menu { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 20px; }
        .options-menu button { margin-top: 0; background: #8e24aa; font-size: 0.9rem; }

        .cursor {
            display:inline-block;
            width:2px;
            background:#333;
            margin-left:3px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {50%{opacity:0;}}
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="Samar Jafri - Chalo Door Kahin (Lyrics).mp3" type="audio/mpeg">
</audio>

<div id="heart-container"></div>

<div id="step1" class="screen active">
    <h1 id="t1"></h1>
    <p id="t2"></p>
    <button onclick="document.getElementById('bgMusic').play(); nextStep(2)">Yes, go ahead</button>
</div>

<div id="step2" class="screen">
    <h1 id="t3"></h1>
    <p id="t4"></p>
    <button onclick="nextStep(3)">Keep going...</button>
</div>

<div id="step3" class="screen">
    <h1 id="t5"></h1>
    <p id="t6"></p>
    <button onclick="nextStep(4)">Next</button>
</div>

<div id="step4" class="screen">
    <h1>Do you forgive me? 🥺</h1>
    <div class="btn-group">
        <button id="btnYes" onclick="nextStep(5)">Yes, I do</button>
        <button id="btnNo" onmouseover="moveNo()" onclick="moveNo()">No</button>
    </div>
</div>

<div id="step5" class="screen">
    <h1>How can I make it up to you? 🎁</h1>
    <p>Pick your peace offering:</p>
    <div class="options-menu">
        <button onclick="chooseOption('A Handwritten Love Letter ✍️')">Handwritten Love Letter</button>
        <button onclick="chooseOption('A Full Yes Day ☀️')">Give you a 'Yes Day'</button>
        <button onclick="chooseOption('Your favorite Homemade Dinner 🍝')">Cook for you</button>
        <button onclick="chooseOption('A Long Heart-to-Heart 🛋️')">Undivided Attention</button>
    </div>
</div>

<div id="step6" class="screen">
    <h1>It's a deal! 🤝</h1>
    <p id="finalMessage"></p>
</div>

<script>
function createHeart() {
    const container = document.getElementById('heart-container');
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
    container.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 4000);
}
setInterval(createHeart, 300);

/* ⚡ Faster cinematic typing */
function typeText(el, text){
    el.innerHTML='';
    let i=0;

    function type(){
        if(i<text.length){

            let delay = 25 + Math.random()*40; // faster

            if(text[i]==='.'||text[i]===',') delay+=150;

            if(Math.random()<0.04){
                const wrong=String.fromCharCode(97+Math.random()*26);
                el.innerHTML+=wrong;
                setTimeout(()=>{
                    el.innerHTML=el.innerHTML.slice(0,-1);
                    setTimeout(type,60);
                },100);
                return;
            }

            el.innerHTML+=text[i];
            i++;
            setTimeout(type,delay);

        } else {
            el.innerHTML+='<span class="cursor"></span>';
        }
    }
    type();
}

function nextStep(step) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');

    if(step===1){
        typeText(t1,"Hey Leyla...");
        setTimeout(()=>typeText(t2,"I know a simple text isn't always enough, so I built this for you.Also its the reason and didnt talk to you after the marriage or i would have done so cause i thought to apologizd correctly...Can you give me a second of your time?"),800);
    }

    if(step===2){
        typeText(t3,"I've been thinking...");
        setTimeout(()=>typeText(t4,"So today no urdu..please bardash my english...also theres a song so little bit volume up...I really hate it when things arent right between us. I take full responsibility for what happened. You deserve better than that.At this point I know all of this is meaningless cause its been a long time like almost month without us talking all because there was a misunderstanding on my end I  am really sorry for that I know at this point its just point less but still Im trying to be my best for u...all the time we spend with u guiding me and still I make those silly mistakes even thought I dont wanna make them its just theres so much going on with the life and I dont know wht do but lets keep those things aside cause I wanna dedicate/talk to u or should I say about u in it because of my mistakes we missed so much ways of making some amazing memories like at the wedding and really I'm sorry for that I don't know if the life would ever give me a chance against or not cause now at the time there's no chance of u coming here and if it's in Gods will that if go abroad for studies then there absolute no chance that the life would ever let us meet again or there would be any gathering type only the gathering that I see from afar is only on Eid third day at Aunty Farkhanda house after that I would probably be busy for abroad things and uni exams...So the main thing I wanted to say that even though it's not the time and pointless for me to ask forgiveness but still I am ashamed to ask u for it...it's countless times that I do these things and ask for forgiveness but I assure u it would be the last time ...If I don't stay in Pakistan or I stay I just want to cherish the remaining time"),800);
    }

    if(step===3){
        typeText(t5,"My Promise");
        setTimeout(()=>typeText(t6,"You are the most special person in my life. I’m truly sorry for hurting you, and I promise to do better.Not only to do better but trying my best to be there for you for all thick and thins I know at this time it all sounds like jokes but I assure you and request you to for the last time to believe in me...you will see a new a better me in me..."),800);
    }

    if(step === 4) {
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');
        btnNo.style.left = (btnYes.offsetLeft + btnYes.offsetWidth + 20) + 'px';
        btnNo.style.top = '0px';
    }
}

window.onload = () => nextStep(1);

function moveNo() {
    const btnNo = document.getElementById('btnNo');
    const x = (Math.random() - 0.5) * 300;
    const y = (Math.random() - 0.5) * 300;
    btnNo.style.left = `${btnNo.offsetLeft + x}px`;
    btnNo.style.top = `${btnNo.offsetTop + y}px`;
}

function chooseOption(choice) {
    document.getElementById('finalMessage').innerHTML =
    `You chose: <b>${choice}</b>.<br><br>I can't wait to make this up to you ❤️`;
    nextStep(6);
}
</script>

</body>
</html>
